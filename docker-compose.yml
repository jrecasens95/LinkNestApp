services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linknest
      POSTGRES_USER: linknest
      POSTGRES_PASSWORD: linknest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linknest -d linknest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgres://linknest:linknest@postgres:5432/linknest?sslmode=disable
      BASE_URL: http://localhost:4000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "3000:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
